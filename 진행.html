<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 진행 상황</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; line-height: 1.6; color: #333; }
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 20px; margin-bottom: 30px; height: 30px; }
        .progress-bar { width: 0%; height: 100%; background-color: #4caf50; text-align: center; line-height: 30px; color: white; border-radius: 20px; transition: width 0.5s ease; font-weight: bold; }
        h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 15px; padding: 15px; border-left: 5px solid #ddd; background-color: #f9f9f9; border-radius: 0 5px 5px 0; }
        .status { font-weight: bold; margin-right: 10px; }
        .pending { color: #95a5a6; }
        .in-progress { color: #f39c12; }
        .completed { color: #2ecc71; text-decoration: line-through; border-left-color: #2ecc71; }
    </style>
</head>
<body>
    <h1>📊 프로젝트 진행 상황</h1>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar" style="width: 20%;">20%</div>
    </div>
    <ul>
        <li class="completed">
            <span class="status completed">[완료]</span> 1. 환경 설정 및 프로젝트 초기화 (Node.js, Express, TypeScript, Neon DB 연결)
        </li>
        <li>
            <span class="status in-progress">[진행 중]</span> 2. 회원 관리 기능 (회원가입, 로그인, 자동 로그인)
        </li>
        <li>
            <span class="status pending">[대기]</span> 3. 게시글 CRUD (목록, 작성, 상세, 수정, 삭제)
        </li>
        <li>
            <span class="status pending">[대기]</span> 4. 댓글 CRUD (작성, 목록, 삭제)
        </li>
        <li>
            <span class="status pending">[대기]</span> 5. 추천 기능 (게시글 추천, 추천수 표시)
        </li>
    </ul>
</body>
</html>
